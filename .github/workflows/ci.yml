name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Check Python Syntax
      run: |
        python -m py_compile backend/auth_service/main.py
        python -m py_compile backend/jobs_service/main.py
        python -m py_compile backend/resume_service/main.py
        python -m py_compile backend/interview_service/main.py
        python -m py_compile backend/analytics_service/main.py

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nextjs-app
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: frontend/nextjs-app/package-lock.json
        
    - name: Install frontend dependencies
      run: npm ci
      
    - name: Build Next.js
      run: npm run build
